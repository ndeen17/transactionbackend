services:
  - type: web
    name: transactionbackend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: "60"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: KYC_MAX_FILE_SIZE_MB
        value: "5"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: DEBUG_LOG_OTP
        value: "false"
